<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel Asistente</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <!-- Top Bar -->
    <div class="top-bar liquid-glass" style="margin: 10px 10px 0 10px; border-radius: 16px;">
        <div class="title-left text-elegant">Centro Comercial</div>
        <div class="title-right text-neon">Asistente</div>
    </div>

    <!-- Main Content Area -->
    <div class="container" id="main-content" style="padding-bottom: 90px; overflow-y: auto;">
        
        <!-- View 1: Extraer (Default) -->
        <div id="view-extraer" class="view-section">
            <div class="liquid-glass" style="padding: 20px; margin-bottom: 20px;">
                <h2 class="text-elegant mb-2" style="font-size: 20px;">Buscador de Prospectos</h2>
                
                <div class="form-group">
                    <label>¿Qué tipo de negocio buscas?</label>
                    <input type="text" id="scraping-query" class="form-control" placeholder="Ej: Odontólogos, Inmobiliarias...">
                </div>
                
                <div class="form-group">
                    <label>Ciudad o Ubicación</label>
                    <input type="text" id="scraping-location" class="form-control" placeholder="Ej: Ciudad de México, Madrid...">
                </div>

                <button class="btn btn-primary" onclick="startScraping()">
                    <i class="fa-solid fa-magnifying-glass" style="margin-right: 8px;"></i> Iniciar Extracción IA
                </button>
            </div>

            <!-- Results -->
            <div id="scraping-results" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h3 class="text-neon" style="font-size: 16px;">Prospectos Encontrados</h3>
                    <span id="results-count" style="font-size: 12px; opacity: 0.6;">0 resultados</span>
                </div>
                <div id="results-container"></div>
            </div>
        </div>

        <!-- View 2: Mensajes -->
        <div id="view-mensajes" class="view-section" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 class="text-elegant" style="font-size: 20px;">Chats Activos</h2>
                <span class="text-neon" style="font-size: 14px;"><i class="fa-solid fa-circle-dot"></i> Online</span>
            </div>
            <div class="form-group">
                <input type="text" class="form-control" style="padding: 10px 15px; font-size: 14px;" placeholder="Buscar chats...">
            </div>
            <div id="chats-list">
                <!-- Chat Item 1 -->
                <div class="liquid-glass" style="padding: 12px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; cursor: pointer;">
                    <div style="position: relative;">
                        <img src="https://ui-avatars.com/api/?name=Juan+Perez&background=39ff14&color=000" style="width: 50px; height: 50px; border-radius: 50%;" alt="Avatar">
                        <div style="position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; background: #25D366; border: 2px solid #000; border-radius: 50%;"></div>
                    </div>
                    <div style="flex-grow: 1;">
                        <div style="display: flex; justify-content: space-between;">
                            <h4 style="font-size: 15px;">Juan Perez (Prospecto)</h4>
                            <span style="font-size: 11px; opacity: 0.5;">12:45</span>
                        </div>
                        <p style="font-size: 13px; color: rgba(255,255,255,0.6); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; max-width: 180px;">Gracias por la info, agendemos...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- View 3: Listas -->
        <div id="view-listas" class="view-section" style="display: none;">
            <h2 class="text-elegant mb-2 text-center">Mis Listas</h2>
            <button class="btn btn-secondary mb-2" style="border-style: dashed;">
                <i class="fa-solid fa-plus"></i> Crear Lista +
            </button>
            <div class="liquid-glass" style="padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
                <span style="font-size: 16px;"><i class="fa-solid fa-list" style="margin-right: 10px; color: var(--neon-green);"></i> Prospectos B2B</span>
                <span style="font-size: 12px; background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 10px;">42 items</span>
            </div>
        </div>

        <!-- View 4: Perfil -->
        <div id="view-perfil" class="view-section" style="display: none;">
            <h2 class="text-elegant mb-2 text-center">Perfil</h2>
            <div class="liquid-glass" style="padding: 30px 20px; text-align: center;">
                <div style="width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.1); margin: 0 auto 20px auto; display: flex; justify-content: center; align-items: center; font-size: 32px;">
                    <i class="fa-solid fa-user"></i>
                </div>
                <h3 style="margin-bottom: 20px;">Cuenta SaaS</h3>
                <button class="btn" style="background: white; color: #333; display: flex; align-items: center; justify-content: center; gap: 10px;">
                    <i class="fa-brands fa-google" style="color: #DB4437;"></i> Registrar con Google
                </button>
            </div>
        </div>

    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav liquid-glass" style="margin: 0 10px 10px 10px;">
        <a href="#" class="nav-item active" onclick="switchView('extraer', this)">
            <i class="fa-solid fa-magnifying-glass"></i>
            <span>Extraer</span>
        </a>
        <a href="#" class="nav-item" onclick="switchView('mensajes', this)">
            <i class="fa-brands fa-whatsapp"></i>
            <span>Mensajes</span>
        </a>
        <a href="#" class="nav-item" onclick="switchView('listas', this)">
            <i class="fa-solid fa-list-ul"></i>
            <span>Listas</span>
        </a>
        <a href="#" class="nav-item" onclick="switchView('perfil', this)">
            <i class="fa-regular fa-user"></i>
            <span>Perfil</span>
        </a>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
