<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel Asistente</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .chat-category-title { font-size: 14px; font-weight: 600; margin: 20px 0 10px 0; display: flex; align-items: center; gap: 8px; }
        .text-orange { color: #FF8C00; }
        .text-blue { color: #3498db; }
        .badge-wa { background: #25D366; color: #000; font-size: 10px; padding: 2px 6px; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="top-bar liquid-glass" style="margin: 10px 10px 0 10px; border-radius: 16px;">
        <div class="title-left text-elegant">Centro Comercial</div>
        <div class="title-right text-neon">Asistente</div>
    </div>

    <div class="container" id="main-content" style="padding-bottom: 90px; overflow-y: auto;">
        
        <!-- View 1: Extraer (HÍBRIDO) -->
        <div id="view-extraer" class="view-section">
            <div class="liquid-glass" style="padding: 20px; margin-bottom: 20px;">
                <h2 class="text-elegant mb-2" style="font-size: 20px;">Buscador Inteligente</h2>
                <div class="form-group">
                    <label>Búsqueda o Enlace</label>
                    <input type="text" id="scraping-query" class="form-control" placeholder="Ej: Odontólogos... o pega una URL">
                </div>
                <div id="location-field" class="form-group">
                    <label>Ubicación (opcional para URLs)</label>
                    <input type="text" id="scraping-location" class="form-control" placeholder="Ej: CDMX...">
                </div>
                <button class="btn btn-primary" onclick="startScraping()">
                    <i class="fa-solid fa-bolt" style="margin-right: 8px;"></i> Ejecutar Extracción IA
                </button>
            </div>
            <div id="scraping-results" style="display: none;">
                <div id="results-container"></div>
            </div>
        </div>

        <!-- View 2: Mensajes -->
        <div id="view-mensajes" class="view-section" style="display: none;">
            <h2 class="text-elegant mb-3">Central de Chats</h2>
            <div class="form-group">
                <input type="text" class="form-control" style="background: rgba(255,255,255,0.05);" placeholder="Buscar conversaciones...">
            </div>
            <div class="chat-category-title text-neon"><i class="fa-solid fa-bolt"></i> Chats Activos</div>
            <div id="list-chats-activos"></div>
            <div class="chat-category-title text-orange"><i class="fa-brands fa-google"></i> GMAIL</div>
            <div id="list-chats-gmail"></div>
            <div class="chat-category-title" style="color: #25D366;"><i class="fa-brands fa-whatsapp"></i> WHATSAPP</div>
            <div id="list-chats-whatsapp"></div>
            <div class="chat-category-title text-blue"><i class="fa-solid fa-address-book"></i> CONTACTOS (LLAMAR)</div>
            <div id="list-chats-contactos"></div>
        </div>

        <!-- View 3: Listas -->
        <div id="view-listas" class="view-section" style="display: none;">
            <h2 class="text-elegant mb-3">Mis Listas</h2>
            <div id="lists-container"></div>
        </div>

        <!-- View 4: Cerebro -->
        <div id="view-perfil" class="view-section" style="display: none;">
            <h2 class="text-elegant mb-3 text-center">Configuración del Cerebro</h2>
            <div class="liquid-glass" style="padding: 20px; margin-bottom: 20px;">
                <div class="form-group">
                    <label>Nombre del Asistente</label>
                    <input type="text" id="ai-name" class="form-control" value="Asistente Virtual">
                </div>
                <div class="form-group">
                    <label>Base de Conocimiento</label>
                    <textarea id="ai-knowledge" class="form-control" style="height: 120px;"></textarea>
                </div>
                <button class="btn btn-primary" onclick="saveAIConfig()">Guardar Cerebro</button>
            </div>
            <div class="liquid-glass" style="padding: 20px; text-align: center;">
                <button class="btn" style="background: white; color: #333; font-size: 14px;" onclick="importGoogleData()">
                    <i class="fa-brands fa-google" style="color: #DB4437;"></i> Vincular con Google
                </button>
                <p style="font-size: 11px; opacity: 0.5; margin-top: 15px;">ID: <span id="display-user-id">...</span></p>
            </div>
        </div>

    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav liquid-glass" style="margin: 0 10px 10px 10px;">
        <a href="#" class="nav-item active" onclick="switchView('extraer', this)">
            <i class="fa-solid fa-magnifying-glass"></i>
            <span>Extraer</span>
        </a>
        <a href="#" class="nav-item" onclick="switchView('mensajes', this)">
            <i class="fa-brands fa-whatsapp"></i>
            <span>Mensajes</span>
        </a>
        <a href="#" class="nav-item" onclick="switchView('listas', this)">
            <i class="fa-solid fa-list-ul"></i>
            <span>Listas</span>
        </a>
        <a href="#" class="nav-item" onclick="switchView('perfil', this)">
            <i class="fa-solid fa-brain"></i>
            <span>Cerebro</span>
        </a>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
