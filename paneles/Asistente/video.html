<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bienvenida - Panel Asistente</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <!-- Top Bar -->
    <div class="top-bar liquid-glass" style="margin: 10px; border-radius: 16px;">
        <div class="title-left text-elegant">Centro Comercial</div>
        <div class="title-right text-neon">Asistente</div>
    </div>

    <div class="container" style="justify-content: center; padding-top: 0;">
        <div class="liquid-glass" style="padding: 20px; text-align: center;">
            <h2 class="text-elegant mb-2" style="font-size: 20px;">Instrucciones de Uso</h2>
            
            <!-- Video Placeholder -->
            <div style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; margin-bottom: 20px; background: #000; border: 1px solid var(--glass-border);">
                <!-- Replace with actual YouTube iframe when URL is provided -->
                <iframe style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;" 
                        src="https://www.youtube.com/embed/ScMzIvxBSi4?si=0m-H2X1wYw77Yj8w" 
                        title="YouTube video player" frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
                </iframe>
            </div>
            
            <!-- Checkbox -->
            <div style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; text-align: left;">
                <input type="checkbox" id="entendido" onchange="toggleContinueBtn()" style="width: 20px; height: 20px; accent-color: var(--neon-green);">
                <label for="entendido" style="font-size: 14px; cursor: pointer; color: rgba(255,255,255,0.8);">He visto el video y entiendo las instrucciones.</label>
            </div>
            
            <a href="panel.html" id="btnContinuar" class="btn btn-secondary" style="pointer-events: none; opacity: 0.5;">Continuar al Panel</a>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
