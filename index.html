<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel Principal - Centro Comercial</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #030303;
            --text-white: #ffffff;
            --neon-green: #39ff14;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-white); min-height: 100vh; overflow-x: hidden; }
        .liquid-glass { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 20px; }
        .text-elegant { font-family: 'Outfit', sans-serif; letter-spacing: 1.5px; }
        .container { max-width: 480px; margin: 0 auto; padding: 20px; }
        .top-bar { display: flex; justify-content: center; align-items: center; padding: 20px; margin-bottom: 20px; border-radius: 0 0 24px 24px; }
        .btn { display: block; width: 100%; padding: 15px; border-radius: 16px; border: none; text-decoration: none; text-align: center; font-weight: 600; transition: 0.3s; margin-top: 15px; cursor: pointer; }
        .btn-primary { background: var(--neon-green); color: #000; }
        #google-map { width: 100%; height: 400px; border-radius: 24px; overflow: hidden; margin-bottom: 20px; border: 1px solid var(--glass-border); }
    </style>
</head>
<body>

    <div class="top-bar liquid-glass">
        <h1 class="text-elegant" style="font-size: 24px;">Centro Comercial</h1>
    </div>

    <div class="container">
        <h2 class="text-elegant mb-2" style="font-size: 18px; margin-bottom: 15px;">Ubicación Satelital</h2>
        
        <!-- Contenedor del Mapa -->
        <div id="google-map"></div>

        <div class="liquid-glass">
            <h3 class="text-elegant" style="font-size: 16px; margin-bottom: 10px;">Mis Paneles</h3>
            <a href="paneles/Asistente/index.html" class="btn btn-primary">
                <i class="fa-solid fa-robot" style="margin-right: 8px;"></i> Abrir Panel Asistente
            </a>
        </div>
    </div>

    <!-- Google Maps Script -->
    <script>
        function initMap() {
            // Ubicación por defecto (se puede cambiar o detectar automáticamente)
            const myLocation = { lat: 4.6097, lng: -74.0817 }; // Ejemplo: Bogotá
            
            const map = new google.maps.Map(document.getElementById("google-map"), {
                zoom: 18,
                center: myLocation,
                mapTypeId: 'satellite', // Modo Satelital como pediste
                disableDefaultUI: true,
                styles: [
                    { "elementType": "geometry", "stylers": [{ "color": "#212121" }] },
                    { "elementType": "labels.text.fill", "stylers": [{ "color": "#757575" }] }
                ]
            });

            const marker = new google.maps.Marker({
                position: myLocation,
                map: map,
                title: "Mi Ubicación"
            });
        }
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBzDIvMnx4kzRQnl5YpDjYOVLFmteAIeeY&callback=initMap" async defer></script>

</body>
</html>
